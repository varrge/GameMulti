openapi: 3.1.0
info:
  title: GameMulti Admin Forum Integration API Draft
  version: 0.1.0
  description: |
    后台论坛联动最小接口契约草稿。
    覆盖 forum account 映射信息、SSO ticket 状态、sync job 状态，以及最小人工操作：重试同步资料。
servers:
  - url: https://api.example.com
paths:
  /api/admin/forum/accounts:
    get:
      summary: 分页查询论坛账户映射列表
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: 按主站用户名、邮箱、论坛用户名、论坛邮箱或 externalUid 搜索
        - in: query
          name: forumProvider
          schema:
            type: string
            default: discourse
        - in: query
          name: syncStatus
          schema:
            type: string
            enum: [pending_initial_sync, active, syncing, sync_failed, disabled]
        - in: query
          name: userStatus
          schema:
            type: string
            enum: [active, disabled, banned]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 论坛账户映射列表
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminForumAccountSummary'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
  /api/admin/forum/accounts/{forumAccountId}:
    get:
      summary: 查询论坛账户映射详情
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: forumAccountId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 论坛账户映射详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminForumAccountDetail'
        '404':
          description: 论坛账户映射不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/forum/tickets:
    get:
      summary: 分页查询论坛 SSO ticket 状态
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: forumProvider
          schema:
            type: string
            default: discourse
        - in: query
          name: status
          schema:
            type: string
            enum: [issued, consumed, expired, cancelled]
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: forumAccountId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: SSO ticket 列表
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminForumTicketSummary'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
  /api/admin/forum/sync-jobs:
    get:
      summary: 分页查询论坛同步任务状态
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: forumProvider
          schema:
            type: string
            default: discourse
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, processing, succeeded, failed, cancelled]
        - in: query
          name: jobType
          schema:
            type: string
            enum: [sync_profile, sync_ban_state, sync_groups, create_account]
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: forumAccountId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 同步任务列表
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminForumSyncJobSummary'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
  /api/admin/forum/sync-jobs/{jobId}/retry-profile:
    post:
      summary: 重试论坛资料同步
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                triggerSource:
                  type: string
                  default: admin_console
                operatorId:
                  type: string
                reason:
                  type: string
                  maxLength: 200
      responses:
        '202':
          description: 已接受重试请求
          content:
            application/json:
              schema:
                type: object
                required: [accepted, retriedJob]
                properties:
                  accepted:
                    type: boolean
                  retriedJob:
                    $ref: '#/components/schemas/AdminForumSyncJobSummary'
        '404':
          description: 任务不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 当前任务状态不允许重试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AdminForumAccountSummary:
      type: object
      required: [forumAccountId, userId, username, forumProvider, forumUserId, forumUsername, syncStatus, mappingSource, createdAt]
      properties:
        forumAccountId:
          type: string
        userId:
          type: string
        username:
          type: string
        email:
          type: string
        userStatus:
          type: string
          enum: [active, disabled, banned]
        forumProvider:
          type: string
        forumUserId:
          type: string
        forumUsername:
          type: string
        forumEmail:
          type: string
          nullable: true
        externalUid:
          type: string
        syncStatus:
          type: string
          enum: [pending_initial_sync, active, syncing, sync_failed, disabled]
        mappingSource:
          type: string
          enum: [auto_create, matched_existing, manual_bind]
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    AdminForumAccountDetail:
      type: object
      required: [account, recentTickets, recentSyncJobs]
      properties:
        account:
          $ref: '#/components/schemas/AdminForumAccountSummary'
        recentTickets:
          type: array
          items:
            $ref: '#/components/schemas/AdminForumTicketSummary'
        recentSyncJobs:
          type: array
          items:
            $ref: '#/components/schemas/AdminForumSyncJobSummary'
    AdminForumTicketSummary:
      type: object
      required: [ticketId, userId, forumAccountId, forumProvider, status, expiresAt, createdAt]
      properties:
        ticketId:
          type: string
        userId:
          type: string
        forumAccountId:
          type: string
        forumProvider:
          type: string
        ticketPreview:
          type: string
          description: 仅供后台查看的脱敏 ticket 前缀
        redirectUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [issued, consumed, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        consumedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    AdminForumSyncJobSummary:
      type: object
      required: [jobId, userId, forumProvider, jobType, triggerSource, status, attemptCount, maxAttempts, createdAt]
      properties:
        jobId:
          type: string
        userId:
          type: string
        forumAccountId:
          type: string
          nullable: true
        forumProvider:
          type: string
        jobType:
          type: string
          enum: [sync_profile, sync_ban_state, sync_groups, create_account]
        triggerSource:
          type: string
        status:
          type: string
          enum: [pending, processing, succeeded, failed, cancelled]
        dedupeKey:
          type: string
        attemptCount:
          type: integer
        maxAttempts:
          type: integer
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
