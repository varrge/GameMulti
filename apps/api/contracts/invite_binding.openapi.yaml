openapi: 3.1.0
info:
  title: GameMulti Invite & Binding API Draft
  version: 0.1.0
  description: |
    邀请制账户与绑定流程接口草稿，覆盖邀请码校验、邀请注册、插件发起绑定会话、按 token / pair code 查询会话、确认绑定。
servers:
  - url: https://api.example.com
paths:
  /api/invitations/validate:
    post:
      summary: 校验邀请码是否可用
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: 校验结果
          content:
            application/json:
              schema:
                type: object
                required: [valid, codeStatus]
                properties:
                  valid:
                    type: boolean
                  codeStatus:
                    type: string
                    enum: [active, disabled, expired, exhausted]
                  remainingUses:
                    type: integer
                  expiresAt:
                    type: string
                    format: date-time
                  message:
                    type: string
  /api/auth/invite-register:
    post:
      summary: 通过邀请码注册账户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password, inviteCode]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                inviteCode:
                  type: string
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '409':
          description: 用户名/邮箱冲突或邀请码不可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/plugin/bindings/session:
    post:
      summary: 插件发起绑定会话
      security:
        - pluginSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverCode, gameCode, platform, gameUserId, displayName, bindMode]
              properties:
                serverCode:
                  type: string
                gameCode:
                  type: string
                platform:
                  type: string
                gameUserId:
                  type: string
                displayName:
                  type: string
                bindMode:
                  type: string
                  enum: [register, bind_existing]
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingSessionCreated'
        '401':
          description: 插件鉴权失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bindings/session/by-token:
    get:
      summary: 根据 token 查询绑定会话
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingSessionView'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bindings/session/by-pair-code:
    post:
      summary: 根据配对码查询绑定会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairCode]
              properties:
                pairCode:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindingSessionView'
        '404':
          description: 未找到
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/bindings/confirm:
    post:
      summary: 确认绑定
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId]
              properties:
                sessionId:
                  type: string
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                type: object
                required: [bindingId, gameAccountId, status]
                properties:
                  bindingId:
                    type: string
                  gameAccountId:
                    type: string
                  status:
                    type: string
                    enum: [active]
        '409':
          description: 会话已用、过期或账号冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    pluginSignature:
      type: apiKey
      in: header
      name: x-plugin-signature
  schemas:
    UserProfile:
      type: object
      required: [id, username, email, status]
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, disabled, banned]
    BindingSessionCreated:
      type: object
      required: [sessionId, token, pairCode, expiresIn, bindUrl]
      properties:
        sessionId:
          type: string
        token:
          type: string
        pairCode:
          type: string
        expiresIn:
          type: integer
        bindUrl:
          type: string
          format: uri
    BindingSessionView:
      type: object
      required: [sessionId, gameCode, platform, gameUserId, status, expiresAt, canConfirm]
      properties:
        sessionId:
          type: string
        gameCode:
          type: string
        serverCode:
          type: string
        platform:
          type: string
        gameUserId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [pending, confirmed, expired, cancelled]
        expiresAt:
          type: string
          format: date-time
        canConfirm:
          type: boolean
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
