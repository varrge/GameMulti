services:
  web:
    image: node:22-bookworm
    container_name: ${APP_NAME:-gamemulti}-web
    working_dir: /app
    command: >-
      sh -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port ${WEB_PORT:-3301}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_PORT:-3301}
      FORUM_BASE_URL: ${FORUM_BASE_URL:-http://192.168.110.218:3000}
      HOSTNAME: 0.0.0.0
    volumes:
      - ${WEB_SOURCE_DIR}:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    expose:
      - "${WEB_PORT:-3301}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.WEB_PORT || 3301) + '/').then(r => process.exit(0)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME:-gamemulti}-nginx
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HOST_HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-gamemulti}-postgres
    profiles: ["data"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamemulti}
      POSTGRES_USER: ${POSTGRES_USER:-gamemulti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-gamemulti}-redis
    profiles: ["data"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

networks:
  app_net:
    name: ${APP_NAME:-gamemulti}_app_net

volumes:
  web_node_modules:
  web_next:
  postgres_data:
  redis_data:
